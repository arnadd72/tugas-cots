<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Part Komputer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" 
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <h4 class="mb-0">Katalog Part Komputer</h4>
            <a href="tambah.html" class="btn btn-success btn-sm">+ Tambah Part</a>
        </div>
        <div class="card-body">
            <table id="tabelProduk" class="table table-striped table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama Part</th>
                        <th>Kategori</th>
                        <th>Harga (Rp)</th>
                        <th>Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    // Arsitektur client-side untuk menarik data JSON dari API
    $(document).ready(function() {
        let table = $('#tabelProduk').DataTable({
            "ajax": "/api/products", // Menarik JSON otomatis
            "columns": [
                { "data": "id" },
                { "data": "nama" },
                { "data": "kategori" },
                { "data": "harga" },
                { "data": "stok" },
                {
                    "data": null,
                    "render": function(data, type, row) {
                        return `
                            <button class="btn btn-warning btn-sm btn-edit" 
                                    data-id="${row.id}">Edit</button>
                            <button class="btn btn-danger btn-sm btn-hapus" 
                                    data-id="${row.id}">Hapus</button>
                        `;
                    }
                }
            ]
        });

        // Logika Hapus Data (DELETE)
        $('#tabelProduk tbody').on('click', '.btn-hapus', function() {
            let id = $(this).data('id');
            if(confirm("Apakah Anda yakin ingin menghapus part ini dari sistem?")) {
                $.ajax({
                    url: `/api/products/${id}`,
                    type: 'DELETE',
                    success: function(res) {
                        alert(res.message);
                        table.ajax.reload(); // Refresh tabel tanpa reload halaman
                    }
                });
            }
        });

        // Logika Arahkan ke Edit (UPDATE)
        $('#tabelProduk tbody').on('click', '.btn-edit', function() {
            let id = $(this).data('id');
            window.location.href = `edit.html?id=${id}`;
        });
    });
</script>
</body>
</html>
